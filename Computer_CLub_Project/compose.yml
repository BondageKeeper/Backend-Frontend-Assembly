version: '3.8'

services:
  db_postgres:
    image: postgres:15-alpine
    container_name: pcbang_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '0631'
      POSTGRES_DB: pcbang_database
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pcbang_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  web_app:
    build: .
    container_name: pcbang_backend
    ports:
      - "80:8080"
      - "443:8080"
    depends_on:
      db_postgres:
        condition: service_healthy
